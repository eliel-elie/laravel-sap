name: Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Version and Notes from Changelog
        id: changelog
        run: |
          # Extract the first version header (e.g., v1.0.7)
          VERSION=$(grep -m 1 '^## \[' CHANGELOG.md | sed -n 's/^## \[\(v[0-9.]*\)\].*/\1/p')
          
          if [ -z "$VERSION" ]; then
            echo "Error: Could not find version in CHANGELOG.md"
            exit 1
          fi
          
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

          # Extract notes for this version
          awk "/^## \[$VERSION\]/{flag=1;next}/^## /{flag=0}flag" CHANGELOG.md > release_notes.md
          
          # If notes are empty, use default message
          if [ ! -s release_notes.md ]; then
            echo "Release $VERSION" > release_notes.md
            echo "" >> release_notes.md
            echo "See [CHANGELOG.md](CHANGELOG.md) for details." >> release_notes.md
          fi

      - name: Check if Tag Already Exists
        id: check_tag
        run: |
          VERSION=${{ steps.changelog.outputs.VERSION }}
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists. Skipping release."
            echo "EXISTS=true" >> $GITHUB_OUTPUT
          else
            echo "EXISTS=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: steps.check_tag.outputs.EXISTS == 'false'
        with:
          tag_name: ${{ steps.changelog.outputs.VERSION }}
          body_path: release_notes.md
          name: ${{ steps.changelog.outputs.VERSION }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
